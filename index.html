<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GistList - Instant AI Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .input-area { min-height: 280px; border: 2px solid #f3f4f6; border-radius: 20px; transition: all 0.2s; }
        .input-area:focus { outline: none; border-color: #2563eb; background-color: #f9fafb; }
        .btn-bounce:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto mb-24">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-black tracking-tighter text-blue-600">GistList</h1>
        <p class="text-gray-400 mt-2 font-medium">Summarize long text & get next actions instantly.</p>
    </header>

    <main class="space-y-6">
        <div class="px-5 py-3 bg-gray-50 rounded-full flex items-center border border-gray-100">
            <span class="text-[10px] font-black text-gray-400 mr-3">OPENAI KEY:</span>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full bg-transparent text-xs focus:outline-none text-gray-700">
        </div>

        <textarea id="inputText" class="w-full p-6 input-area text-base shadow-sm" placeholder="Paste long articles, news, or threads here..."></textarea>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="processAI('summary')" class="btn-bounce bg-blue-600 text-white font-black py-6 rounded-2xl shadow-xl hover:bg-blue-700 transition-all">
                Summarize
                <span class="block text-[10px] font-normal opacity-70">Key Points</span>
            </button>
            <button onclick="processAI('action')" class="btn-bounce bg-black text-white font-black py-6 rounded-2xl shadow-xl hover:bg-gray-800 transition-all">
                Next Action
                <span class="block text-[10px] font-normal opacity-70">What to do</span>
            </button>
        </div>

        <div id="loading" class="hidden py-12 text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
            <p class="text-sm font-black text-blue-600 mt-3 uppercase tracking-widest">Thinking...</p>
        </div>

        <div id="outputContainer" class="hidden mt-10">
            <div class="p-8 bg-blue-50 rounded-[32px] border-2 border-blue-100 relative shadow-inner">
                <div id="outputText" class="text-gray-900 text-lg leading-relaxed whitespace-pre-wrap font-medium"></div>
                
                <button onclick="copyText()" class="mt-8 w-full py-4 bg-white border-2 border-blue-200 rounded-2xl text-blue-600 font-black text-sm hover:bg-white hover:border-blue-400 transition-all shadow-sm">
                    COPY RESULT
                </button>
            </div>
        </div>
    </main>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        apiKeyInput.value = localStorage.getItem('gistlist_api_key') || '';
        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('gistlist_api_key', apiKeyInput.value);
        });

        async function processAI(type) {
            const text = document.getElementById('inputText').value;
            const key = apiKeyInput.value;
            const loading = document.getElementById('loading');
            const outputContainer = document.getElementById('outputContainer');
            const outputText = document.getElementById('outputText');

            if (!text || !key) { alert("Please enter text and API Key!"); return; }

            loading.classList.remove('hidden');
            outputContainer.classList.add('hidden');

            // 「3つ」という制限を削除し、重要なポイントを抽出するように変更
            const systemPrompt = type === 'summary' 
                ? "You are a professional summarizer. Extract and summarize the key points of the given text in bullet points. Provide the output in English."
                : "Read the text and provide exactly ONE concrete 'Next Action' the user should take. Make it powerful and concise. Answer in English.";

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const result = data.choices[0].message.content;
                outputText.innerText = result;
                outputContainer.classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied!");
            });
        }
    </script>
</body>
</html>
