<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GistList - Gemini Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #111827; font-family: sans-serif; }
        .input-area { min-height: 280px; border: 2px solid #f3f4f6; border-radius: 20px; transition: all 0.2s; }
        .input-area:focus { outline: none; border-color: #10b981; background-color: #f9fafb; }
        .btn-bounce:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto mb-24">
    <header class="py-10 text-center">
        <h1 class="text-4xl font-black tracking-tighter text-green-600">GistList</h1>
        <p class="text-gray-400 mt-2 font-medium">Free AI Summaries by Gemini 1.5 Flash</p>
    </header>

    <main class="space-y-6">
        <textarea id="inputText" class="w-full p-6 input-area text-base shadow-sm" placeholder="Paste anything here..."></textarea>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="processAI('summary')" class="btn-bounce bg-green-600 text-white font-black py-6 rounded-2xl shadow-xl hover:bg-green-700 transition-all">
                Gist it
            </button>
            <button onclick="processAI('action')" class="btn-bounce bg-black text-white font-black py-6 rounded-2xl shadow-xl hover:bg-gray-800 transition-all">
                Next Action
            </button>
        </div>

        <div id="loading" class="hidden py-12 text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-green-500 border-t-transparent"></div>
            <p class="text-sm font-black text-green-600 mt-3 uppercase tracking-widest">Processing...</p>
        </div>

        <div id="outputContainer" class="hidden mt-10">
            <div class="p-8 bg-green-50 rounded-[32px] border-2 border-green-100 relative shadow-inner">
                <div id="outputText" class="text-gray-900 text-lg leading-relaxed whitespace-pre-wrap font-medium"></div>
                <button onclick="copyText()" class="mt-8 w-full py-4 bg-white border-2 border-green-200 rounded-2xl text-green-600 font-black text-sm hover:border-green-400 transition-all">
                    COPY RESULT
                </button>
            </div>
        </div>
    </main>

    <script>
        async function processAI(type) {
            const text = document.getElementById('inputText').value;
            const loading = document.getElementById('loading');
            const outputContainer = document.getElementById('outputContainer');
            const outputText = document.getElementById('outputText');

            if (!text) { alert("Paste some text!"); return; }

            loading.classList.remove('hidden');
            outputContainer.classList.add('hidden');

            try {
                // VercelのAPIサーバーへ送信
                const response = await fetch('/api/gist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, type })
                });
                const data = await response.json();
                outputText.innerText = data.result;
                outputContainer.classList.remove('hidden');
            } catch (error) {
                alert("Error happened!");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
